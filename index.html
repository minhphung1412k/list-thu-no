<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ ghi nợ</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --success-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --danger: #ef4444;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(-45deg, #fbc2eb, #a6c1ee, #fbc2eb);
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            padding: 20px 16px;
            font-size: 15px;
            min-height: 100vh;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .wrapper {
            max-width: 750px;
            margin: 0 auto;
        }

        .header-box {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .header-box h1 {
            font-size: 26px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .network-status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sub);
            background: rgba(255,255,255,0.6);
            padding: 6px 16px;
            border-radius: 20px;
        }
        .status-indicator {
            width: 8px; height: 8px; border-radius: 50%; background-color: #cbd5e1;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.8);
        }
        .status-online { background-color: #22c55e; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2); }
        .status-error { background-color: #ef4444; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2); }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
            margin-bottom: 25px;
        }

        .flex-row { display: flex; gap: 12px; margin-bottom: 15px; }
        .flex-row:last-child { margin-bottom: 0; }

        input[type="text"], input[type="date"] {
            flex: 1; padding: 14px 18px;
            border: 2px solid transparent; border-radius: 16px;
            font-size: 15px; font-weight: 600; outline: none;
            background-color: rgba(255, 255, 255, 0.9);
            color: var(--text-main); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            width: 100%;
        }
        input::placeholder { color: #94a3b8; font-weight: 500; }
        input[type="text"]:focus, input[type="date"]:focus {
            border-color: #a855f7;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.15);
            transform: translateY(-1px);
        }

        .btn {
            padding: 14px 24px; border: none; border-radius: 16px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            transition: all 0.2s ease; white-space: nowrap;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: var(--primary-gradient); color: #ffffff; }
        .btn-action { background: var(--success-gradient); color: #ffffff; width: 100%; font-size: 16px; padding: 16px; margin-top: 10px; }
        .btn-text-danger { background: rgba(254, 226, 226, 0.8); color: var(--danger); font-size: 13px; padding: 8px 14px; border-radius: 10px; }
        .btn-text-danger:hover { background: var(--danger); color: white; }
        .btn-text-edit { background: rgba(224, 242, 254, 0.8); color: #0284c7; font-size: 13px; padding: 8px 14px; border-radius: 10px; }
        .btn-text-edit:hover { background: #0284c7; color: white; }

        .person-card {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 28px; padding: 24px;
            box-shadow: var(--glass-shadow); border: 1px solid var(--glass-border);
            margin-bottom: 20px; transition: transform 0.3s ease;
        }
        .person-card:hover { transform: translateY(-2px); }

        .person-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 2px dashed rgba(203, 213, 225, 0.5);
            padding-bottom: 16px; margin-bottom: 16px; flex-wrap: wrap; gap: 15px;
        }

        .person-name-box { display: flex; flex-direction: column; gap: 10px; }
        .person-name { font-size: 22px; font-weight: 800; color: #0f172a; }
        .person-ops { display: flex; gap: 8px; }

        .summary-money {
            font-size: 18px; font-weight: 800; color: #059669;
            background: rgba(209, 250, 229, 0.7); padding: 10px 18px;
            border-radius: 14px; text-align: right; border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .section-title {
            font-size: 13px; font-weight: 700; color: var(--text-sub);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }

        .logs-container {
            display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;
            max-height: 200px; overflow-y: auto; padding-right: 5px;
        }
        .logs-container::-webkit-scrollbar { width: 6px; }
        .logs-container::-webkit-scrollbar-thumb { background: rgba(203, 213, 225, 0.8); border-radius: 10px; }

        .log-row {
            background: rgba(255, 255, 255, 0.6); padding: 12px 16px; border-radius: 14px;
            font-size: 15px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.4);
        }
        .log-date { color: var(--text-sub); font-weight: 600; font-size: 14px; }
        .log-amount { font-weight: 800; color: #059669; }
        .log-actions { display: flex; gap: 6px; }
        
        .btn-mini {
            border: none; padding: 6px 10px; font-size: 12px; font-weight: 700; 
            border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .btn-mini-edit { background: rgba(224, 242, 254, 0.8); color: #0284c7; }
        .btn-mini-edit:hover { background: #0284c7; color: white; }
        .btn-mini-delete { background: rgba(254, 226, 226, 0.8); color: #b91c1c; }
        .btn-mini-delete:hover { background: #dc2626; color: white; }

        .grid-inputs {
            display: grid; grid-template-columns: 1fr; gap: 12px;
            background: rgba(248, 250, 252, 0.5); padding: 16px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.6);
        }
        @media(min-width: 550px) {
            .grid-inputs { grid-template-columns: 1fr 1fr; align-items: end; }
            .btn-action { grid-column: span 2; }
        }

        .field-group { display: flex; flex-direction: column; gap: 6px; }
        .field-group label { font-size: 13px; font-weight: 700; color: var(--text-sub); padding-left: 4px; }

        .suggest-wrapper { position: relative; }
        .suggest-box {
            display: none; position: absolute; top: calc(100% + 8px); left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8); border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); z-index: 10; overflow: hidden;
        }
        .suggest-item {
            padding: 12px 18px; cursor: pointer; font-weight: 700; color: var(--text-sub); font-size: 15px;
            border-bottom: 1px solid rgba(241, 245, 249, 0.8); transition: all 0.2s;
        }
        .suggest-item:last-child { border-bottom: none; }
        .suggest-item:hover { background: #f0f9ff; color: var(--primary); padding-left: 22px; }

        #toast-box {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 380px; z-index: 99999; display: flex; flex-direction: column; gap: 10px;
        }
        .toast-msg {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px);
            color: #ffffff; padding: 14px 20px; border-radius: 16px; font-size: 15px; font-weight: 700; 
            text-align: center; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popUp { from { transform: translateY(-20px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        .overlay {
            display: none; position: fixed; top:0; left:0; right:0; bottom:0;
            background: rgba(15, 23, 42, 0.5); z-index: 99999; align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(5px);
        }
        .popup-box {
            background: #ffffff; padding: 28px; border-radius: 28px; max-width: 420px; width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border: 1px solid rgba(255,255,255,0.5);
            animation: modalIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .popup-title { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 12px; }
        .popup-body { font-size: 15px; color: var(--text-sub); margin-bottom: 24px; font-weight: 600; line-height: 1.5; }
        .popup-body input { margin-top: 12px; background-color: #f8fafc; border: 2px solid #e2e8f0; }
        .popup-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .popup-buttons .btn { flex: 1; padding: 12px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div id="toast-box"></div>

<div id="modal-view" class="overlay">
    <div class="popup-box">
        <div id="p-title" class="popup-title"></div>
        <div id="p-body" class="popup-body"></div>
        <div id="p-footer" class="popup-buttons"></div>
    </div>
</div>

<div class="wrapper">
    <div class="header-box">
        <h1>Sổ ghi nợ</h1>
        <div class="network-status">
            <div id="indicator" class="status-indicator"></div>
            <span id="status-text">Đang kết nối...</span>
        </div>
    </div>

    <div class="glass-panel">
        <div class="flex-row" style="flex-wrap: wrap;">
            <input type="text" id="new-user-name" placeholder="Thêm tên người mới...">
            <button class="btn btn-primary" onclick="addUser()">Thêm vào sổ</button>
        </div>
        <div class="flex-row" style="border-top: 2px dashed rgba(203,213,225,0.4); padding-top: 18px; margin-top: 5px; margin-bottom: 0;">
            <input type="text" id="search-user-name" placeholder="Gõ để tìm kiếm...">
        </div>
    </div>

    <div id="content-list"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDL-Ejne2yDo446xVHW1LRLWekHJov_luw",
        authDomain: "sonocuame.firebaseapp.com",
        projectId: "sonocuame",
        storageBucket: "sonocuame.firebasestorage.app",
        messagingSenderId: "797314727372",
        appId: "1:797314727372:web:5afb883ef6de48489cf169",
        databaseURL: "https://sonocuame-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    let db = firebase.database().ref('debtors_store');
    let debtors = [];
    let searchQuery = "";

    function initializeRealtimeConnection() {
        db.on('value', (snapshot) => {
            handleIncomingData(snapshot);
        }, (error) => {
            handleConnectionError(error);
        });
    }

    function handleIncomingData(snapshot) {
        const data = snapshot.val();
        if (data) {
            debtors = Object.keys(data).map(key => {
                let user = data[key];
                user.fbKey = key;
                if (!user.history) user.history = [];
                if (user.history && !Array.isArray(user.history)) {
                    user.history = Object.keys(user.history).map(hKey => user.history[hKey]);
                }
                return user;
            });
        } else {
            debtors = [];
        }
        document.getElementById('indicator').className = 'status-indicator status-online';
        document.getElementById('status-text').innerText = 'Đã kết nối';
        renderList();
    }

    function handleConnectionError(error) {
        document.getElementById('indicator').className = 'status-indicator status-error';
        document.getElementById('status-text').innerText = 'Lỗi kết nối!';
    }

    initializeRealtimeConnection();

    function focusAndMoveCursorToEnd(inputElement) {
        inputElement.focus();
        const length = inputElement.value.length;
        inputElement.setSelectionRange(length, length);
    }

    function showToast(message, isError = false) {
        const box = document.getElementById('toast-box');
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        if(isError) toast.style.backgroundColor = 'rgba(220, 38, 38, 0.95)';
        else toast.style.backgroundColor = 'rgba(16, 185, 129, 0.95)';
        toast.innerText = message;
        box.appendChild(toast);
        setTimeout(() => { 
            toast.style.opacity = '0'; 
            toast.style.transform = 'translateY(-10px)';
            toast.style.transition = 'all 0.3s';
            setTimeout(() => toast.remove(), 300); 
        }, 2500);
    }

    function showModal(title, bodyHTML, footerHTML) {
        const modal = document.getElementById('modal-view');
        document.getElementById('p-title').innerText = title;
        document.getElementById('p-body').innerHTML = bodyHTML;
        document.getElementById('p-footer').innerHTML = footerHTML;
        modal.style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('modal-view').style.display = 'none';
    }

    function searchUser() {
        searchQuery = document.getElementById('search-user-name').value.trim().toLowerCase();
        renderList();
    }

    function formatMoney(amount) {
        return amount.toLocaleString('vi-VN') + 'đ';
    }

    function formatInputMoney(input) {
        let value = input.value.replace(/\./g, '');
        if (!isNaN(value) && value !== '') {
            input.setAttribute('data-raw', value);
            input.value = parseInt(value).toLocaleString('vi-VN');
        } else {
            input.setAttribute('data-raw', '');
        }
    }

    function formatVietnameseDate(dateStr) {
        if (!dateStr) return "";
        const parts = dateStr.split('-');
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    function getTodayInputFormat() {
        const today = new Date();
        const dd = String(today.getDate()).padStart(2, '0');
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const yyyy = today.getFullYear();
        return `${yyyy}-${mm}-${dd}`;
    }

    function addUser() {
        const nameInput = document.getElementById('new-user-name');
        const name = nameInput.value.trim();
        if (!name) {
            showToast('Vui lòng nhập tên!', true);
            return;
        }
        
        db.push({
            id: Date.now(),
            name: name,
            history: []
        }).then(() => {
            nameInput.value = '';
            showToast(`Đã thêm: ${name}`);
        });
    }

    function deleteUser(fbKey, name) {
        showModal(
            'Xác nhận xóa',
            `Xóa tên <b>${name}</b> và lịch sử?`,
            `<button class="btn" style="background:#e2e8f0; color:#475569" onclick="closeModal()">Hủy</button>
             <button class="btn" style="background:var(--danger); color:white" onclick="confirmDelete('${fbKey}')">Xóa</button>`
        );
    }
    function confirmDelete(fbKey) {
        firebase.database().ref('debtors_store/' + fbKey).remove().then(() => {
            closeModal();
            showToast('Đã xóa', true);
        });
    }

    function editUser(fbKey, oldName) {
        showModal(
            'Đổi tên',
            `<input type="text" id="edit-name-input" value="${oldName}" placeholder="Tên mới...">`,
            `<button class="btn" style="background:#e2e8f0; color:#475569" onclick="closeModal()">Hủy</button>
             <button class="btn btn-primary" onclick="confirmEdit('${fbKey}')">Lưu</button>`
        );
        setTimeout(() => {
            const el = document.getElementById('edit-name-input');
            focusAndMoveCursorToEnd(el);
        }, 100);
    }
    function confirmEdit(fbKey) {
        const newName = document.getElementById('edit-name-input').value.trim();
        if(newName) {
            firebase.database().ref('debtors_store/' + fbKey).update({
                name: newName
            }).then(() => {
                closeModal();
                showToast('Đã đổi tên');
            });
        }
    }

    function deleteHistoryItem(fbKey, itemIndex) {
        showModal(
            'Xóa dòng này',
            `Xóa ghi chép này?`,
            `<button class="btn" style="background:#e2e8f0; color:#475569" onclick="closeModal()">Hủy</button>
             <button class="btn" style="background:var(--danger); color:white" onclick="confirmDeleteHistoryItem('${fbKey}', ${itemIndex})">Xóa</button>`
        );
    }
    function confirmDeleteHistoryItem(fbKey, itemIndex) {
        const user = debtors.find(u => u.fbKey === fbKey);
        if(user) {
            let updatedHistory = [...user.history];
            updatedHistory.splice(itemIndex, 1);
            
            firebase.database().ref('debtors_store/' + fbKey).update({
                history: updatedHistory
            }).then(() => {
                closeModal();
                showToast('Đã xóa!', true);
            });
        }
    }

    function editHistoryItem(fbKey, itemIndex, oldAmount) {
        showModal(
            'Sửa số tiền',
            `<input type="text" id="edit-money-input" value="${oldAmount.toLocaleString('vi-VN')}" oninput="formatInputMoney(this)">`,
            `<button class="btn" style="background:#e2e8f0; color:#475569" onclick="closeModal()">Hủy</button>
             <button class="btn btn-primary" onclick="confirmEditHistoryItem('${fbKey}', ${itemIndex})">Cập nhật</button>`
        );
        setTimeout(() => {
            const input = document.getElementById('edit-money-input');
            focusAndMoveCursorToEnd(input);
            input.setAttribute('data-raw', oldAmount);
        }, 100);
    }
    function confirmEditHistoryItem(fbKey, itemIndex) {
        const input = document.getElementById('edit-money-input');
        let rawAmount = input.getAttribute('data-raw') || input.value.replace(/\./g, '');
        let newAmount = parseInt(rawAmount);

        if(!newAmount || newAmount <= 0) return;

        const user = debtors.find(u => u.fbKey === fbKey);
        if(user) {
            let updatedHistory = [...user.history];
            updatedHistory[itemIndex].amount = newAmount;
            
            firebase.database().ref('debtors_store/' + fbKey).update({
                history: updatedHistory
            }).then(() => {
                closeModal();
                showToast('Đã sửa!');
            });
        }
    }

    function toggleSuggestions(id, show) {
        const sugDiv = document.getElementById(`sug-${id}`);
        if(show) {
            sugDiv.style.display = 'block';
        } else {
            setTimeout(() => { sugDiv.style.display = 'none'; }, 200);
        }
    }

    function selectSuggestion(id, value) {
        const input = document.getElementById(`input-${id}`);
        input.value = value.toLocaleString('vi-VN');
        input.setAttribute('data-raw', value);
    }

    function collectMoney(fbKey, id) {
        const input = document.getElementById(`input-${id}`);
        const dateInput = document.getElementById(`date-${id}`);
        
        let rawAmount = input.getAttribute('data-raw') || input.value.replace(/\./g, '');
        let amount = parseInt(rawAmount);
        let dateValue = dateInput.value;

        if (!amount || amount <= 0 || !dateValue) {
            showToast('Vui lòng điền đủ ngày và số tiền!', true);
            return;
        }

        const formattedDate = formatVietnameseDate(dateValue);
        const user = debtors.find(u => u.fbKey === fbKey);
        
        let updatedHistory = user.history ? [...user.history] : [];
        updatedHistory.push({
            timestamp: Date.now(),
            date: formattedDate,
            amount: amount
        });

        firebase.database().ref('debtors_store/' + fbKey).update({
            history: updatedHistory
        }).then(() => {
            input.value = '';
            input.setAttribute('data-raw', '');
            showToast(`Đã lưu: Thu ${formatMoney(amount)} từ ${user.name}`);
        });
    }

    function renderList() {
        const listDiv = document.getElementById('content-list');
        listDiv.innerHTML = '';

        let filteredDebtors = debtors;
        if(searchQuery !== "") {
            filteredDebtors = debtors.filter(user => user.name.toLowerCase().includes(searchQuery));
        }

        if(filteredDebtors.length === 0) {
            listDiv.innerHTML = `<div style="text-align:center; padding: 30px; background: var(--glass-bg); border-radius: 20px; color: var(--text-sub); font-weight: 700; font-size: 16px;">
                ${searchQuery === "" ? "Không có dữ liệu." : "Không tìm thấy tên."}
            </div>`;
            return;
        }

        filteredDebtors.forEach(user => {
            const total = user.history.reduce((sum, item) => sum + item.amount, 0);

            let historyHTML = '';
            user.history.forEach((item, index) => {
                historyHTML += `
                    <div class="log-row">
                        <div>
                            <span class="log-date">${item.date}</span>
                            <span class="log-amount" style="margin-left:12px;">+${formatMoney(item.amount)}</span>
                        </div>
                        <div class="log-actions">
                            <button class="btn-mini btn-mini-edit" onclick="editHistoryItem('${user.fbKey}', ${index}, ${item.amount})">Sửa</button>
                            <button class="btn-mini btn-mini-delete" onclick="deleteHistoryItem('${user.fbKey}', ${index})">Xóa</button>
                        </div>
                    </div>
                `;
            });

            if(user.history.length === 0) {
                historyHTML = '<div style="text-align:center; padding:12px; color:#94a3b8; font-weight:600; font-size: 14px; background: rgba(255,255,255,0.4); border-radius: 12px;">Chưa có lịch sử</div>';
            }

            const card = document.createElement('div');
            card.className = 'person-card';
            card.innerHTML = `
                <div class="person-header">
                    <div class="person-name-box">
                        <span class="person-name">${user.name}</span>
                        <div class="person-ops">
                            <button class="btn-text-edit" onclick="editUser('${user.fbKey}', '${user.name}')">Đổi tên</button>
                            <button class="btn-text-danger" onclick="deleteUser('${user.fbKey}', '${user.name}')">Xóa</button>
                        </div>
                    </div>
                    <div class="summary-money">Tổng: ${formatMoney(total)}</div>
                </div>

                <div class="section-title">Nhật ký:</div>
                <div class="logs-container">
                    ${historyHTML}
                </div>

                <div class="grid-inputs">
                    <div class="field-group">
                        <label>Ngày thu:</label>
                        <input type="date" id="date-${user.id}" value="${getTodayInputFormat()}">
                    </div>
                    
                    <div class="field-group">
                        <label>Số tiền (VNĐ):</label>
                        <div class="suggest-wrapper">
                            <input type="text" id="input-${user.id}" placeholder="Nhập số tiền..." 
                                   oninput="formatInputMoney(this)"
                                   onfocus="toggleSuggestions(${user.id}, true)" 
                                   onblur="toggleSuggestions(${user.id}, false)">
                            
                            <div id="sug-${user.id}" class="suggest-box">
                                <div class="suggest-item" onmousedown="selectSuggestion(${user.id}, 50000)">50.000 đ</div>
                                <div class="suggest-item" onmousedown="selectSuggestion(${user.id}, 100000)">100.000 đ</div>
                                <div class="suggest-item" onmousedown="selectSuggestion(${user.id}, 200000)">200.000 đ</div>
                                <div class="suggest-item" onmousedown="selectSuggestion(${user.id}, 500000)">500.000 đ</div>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-action" onclick="collectMoney('${user.fbKey}', ${user.id})">Xác nhận thu tiền</button>
                </div>
            `;
            listDiv.appendChild(card);
        });
    }
</script>
</body>
</html>
